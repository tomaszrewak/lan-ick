<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lan-ick Error Detector</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      max-width: 820px;
      margin: 48px auto;
      padding: 0 24px;
      background: #daeecf;
      color: #2a2a2a;
    }
    h1 {
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }

    /* Overlay container: backdrop + textarea stacked */
    .input-wrap {
      position: relative;
      width: 100%;
      height: 150px;
    }
    #backdrop {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.5;
      color: transparent;
      background: #fff;
      border: 1.5px dashed #c0c6cf;
      border-radius: 8px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #input {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.5;
      color: #2a2a2a;
      background: transparent;
      border: 1.5px dashed #c0c6cf;
      border-radius: 8px;
      resize: none;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      outline: none;
    }
    #input:focus {
      border-color: #8090a8;
    }
    #input::placeholder { color: #aab; }

    /* Error highlights in backdrop — pill style */
    .hw {
      border-radius: 4px;
      padding: 1px 3px;
      margin: -1px -3px;   /* compensate so text doesn't shift */
    }
    .hw-spelling    { background: rgba(240, 80, 80, 0.22); }
    .hw-word_choice { background: rgba(230, 140, 30, 0.22); }
    .hw-grammar     { background: rgba(170, 80, 230, 0.22); }
    .hw-word_order  { background: rgba(40, 130, 240, 0.22); }
    .hw-extra_word  { background: rgba(220, 180, 30, 0.22); }
    .hw-wtf         { background: rgba(140, 140, 150, 0.28); }

    #status {
      color: #999;
      font-size: 12px;
      margin: 10px 2px 0;
      letter-spacing: 0.2px;
    }

    /* Grid / table */
    table {
      width: 100%;
      margin-top: 14px;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid #e0e3e8;
      border-radius: 8px;
      overflow: hidden;
      font-size: 13px;
    }
    th, td {
      padding: 4px 8px;
      text-align: left;
      border-bottom: 1px solid #eceef1;
    }
    th {
      background: #f0f1f4;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
    }
    tr:last-child td { border-bottom: none; }
    .error { background: #ffe9e9; }
    .clean { background: #fff; }
    .error td:nth-child(2) { font-weight: 600; }
  </style>
</head>
<body>
  <h1>Lan-ick Error Detector</h1>
  <div class="input-wrap">
    <div id="backdrop"></div>
    <textarea id="input" placeholder="Type or paste text here..."></textarea>
  </div>
  <div id="status">Ready</div>
  <table id="results" hidden>
    <thead>
      <tr>
        <th>#</th>
        <th>Word</th>
        <th>spelling</th>
        <th>word_choice</th>
        <th>grammar</th>
        <th>word_order</th>
        <th>extra_word</th>
        <th>wtf</th>
      </tr>
    </thead>
    <tbody id="results-body"></tbody>
  </table>
  <script>
    const ERROR_TYPES = ['spelling', 'word_choice', 'grammar', 'word_order', 'extra_word', 'wtf'];
    const input = document.getElementById('input');
    const backdrop = document.getElementById('backdrop');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const tbody = document.getElementById('results-body');

    // --------------- Sync scroll between textarea and backdrop ---------------
    input.addEventListener('scroll', () => {
      backdrop.scrollTop = input.scrollTop;
      backdrop.scrollLeft = input.scrollLeft;
    });

    // --------------- State ---------------
    let inflight = null;     // AbortController of current request, or null
    let pending = false;     // true if a re-check is scheduled after current finishes

    // Last completed classification result
    let lastResult = null;   // { text: string, words: [{word, errors}, ...] }

    // --------------- Debounce: fire-or-schedule on every input ---------------
    input.addEventListener('input', () => {
      updateHighlights();    // re-apply highlights to current text immediately
      if (inflight) {
        pending = true;      // already running — schedule one more
      } else {
        fireCheck();         // nothing running — fire now
      }
    });

    async function fireCheck() {
      const text = input.value.trim();
      if (!text) {
        lastResult = null;
        results.hidden = true;
        status.textContent = 'Ready';
        updateHighlights();
        return;
      }

      const controller = new AbortController();
      inflight = controller;
      pending = false;
      status.textContent = 'Checking\u2026';

      try {
        const resp = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
          signal: controller.signal,
        });
        const data = await resp.json();
        if (data.error) {
          status.textContent = 'Error: ' + data.error;
          return;
        }
        lastResult = { text, words: data.words };
        renderResults(data.words);
        updateHighlights();
        status.textContent = `Checked ${data.words.length} words`;
      } catch (e) {
        if (e.name !== 'AbortError') {
          status.textContent = 'Error: ' + e.message;
        }
      } finally {
        inflight = null;
        if (pending) {
          pending = false;
          fireCheck();       // re-check with whatever text is now in the box
        }
      }
    }

    // --------------- Highlight overlay ---------------
    function updateHighlights() {
      const currentText = input.value;
      if (!currentText) {
        backdrop.innerHTML = '';
        return;
      }

      if (!lastResult) {
        // No classification yet — show plain (escaped) text so whitespace matches
        backdrop.innerHTML = esc(currentText);
        return;
      }

      // Split both current text and classified text into words (by whitespace)
      const currentWords = currentText.split(/(\s+)/);   // keeps separators
      const classifiedWords = lastResult.text.split(/\s+/);

      // Build a map: classified word index → error type (first / highest)
      const errorMap = {};  // { wordIdx: topErrorType }
      lastResult.words.forEach((w, i) => {
        const types = Object.keys(w.errors);
        if (types.length > 0) {
          errorMap[i] = types[0]; // first listed type
        }
      });

      // Walk current tokens; non-space tokens get a word index
      let wordIdx = 0;
      let html = '';
      for (const token of currentWords) {
        if (/^\s+$/.test(token)) {
          // whitespace — preserve exactly
          html += esc(token);
        } else {
          // real word — check if it matches same-index classified word
          const errorType = errorMap[wordIdx];
          const classWord = classifiedWords[wordIdx];
          if (errorType && token === classWord) {
            html += `<mark class="hw hw-${errorType}">${esc(token)}</mark>`;
          } else {
            html += esc(token);
          }
          wordIdx++;
        }
      }
      backdrop.innerHTML = html;
    }

    // --------------- Results table ---------------
    function renderResults(words) {
      tbody.innerHTML = '';
      results.hidden = false;
      words.forEach((w, i) => {
        const tr = document.createElement('tr');
        const hasError = Object.keys(w.errors).length > 0;
        tr.className = hasError ? 'error' : 'clean';
        tr.innerHTML = `<td>${i + 1}</td><td>${esc(w.word)}</td>` +
          ERROR_TYPES.map(et => {
            const triggered = w.errors[et];
            const pred = w.predictions && w.predictions[et];
            if (triggered !== undefined) {
              return `<td>${triggered.toFixed(3)}</td>`;
            } else if (pred !== undefined) {
              return `<td style="color:rgba(42,42,42,0.1)">${pred.toFixed(3)}</td>`;
            }
            return `<td></td>`;
          }).join('');
        tbody.appendChild(tr);
      });
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
