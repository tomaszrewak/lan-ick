<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lan-ick Error Detector</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; }

    /* Overlay container: backdrop + textarea stacked */
    .input-wrap {
      position: relative;
      width: 100%;
      height: 150px;
    }
    #backdrop {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      padding: 8px;
      font-size: 16px;
      font-family: monospace;
      line-height: 1.4;
      color: transparent;       /* text invisible, only highlights show */
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-sizing: border-box;
    }
    #input {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      padding: 8px;
      font-size: 16px;
      font-family: monospace;
      line-height: 1.4;
      color: #000;
      background: transparent;  /* see-through to backdrop */
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: none;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-sizing: border-box;
    }

    /* Error highlights in backdrop */
    .hw { border-radius: 2px; }
    .hw-spelling    { background: rgba(255, 100, 100, 0.30); }
    .hw-word_choice { background: rgba(255, 160, 50, 0.30); }
    .hw-grammar     { background: rgba(200, 100, 255, 0.30); }
    .hw-word_order  { background: rgba(50, 150, 255, 0.30); }
    .hw-extra_word  { background: rgba(255, 200, 50, 0.30); }
    .hw-wtf         { background: rgba(180, 180, 180, 0.40); }

    #status { color: #888; margin: 8px 0; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
    th { background: #f5f5f5; }
    .error { background: #ffe0e0; }
    .clean { background: #e8f5e9; }
  </style>
</head>
<body>
  <h1>Lan-ick Error Detector</h1>
  <div class="input-wrap">
    <div id="backdrop"></div>
    <textarea id="input" placeholder="Type or paste text here..."></textarea>
  </div>
  <div id="status">Ready</div>
  <table id="results" hidden>
    <thead>
      <tr>
        <th>#</th>
        <th>Word</th>
        <th>spelling</th>
        <th>word_choice</th>
        <th>grammar</th>
        <th>word_order</th>
        <th>extra_word</th>
        <th>wtf</th>
      </tr>
    </thead>
    <tbody id="results-body"></tbody>
  </table>
  <script>
    const ERROR_TYPES = ['spelling', 'word_choice', 'grammar', 'word_order', 'extra_word', 'wtf'];
    const input = document.getElementById('input');
    const backdrop = document.getElementById('backdrop');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const tbody = document.getElementById('results-body');

    // --------------- Sync scroll between textarea and backdrop ---------------
    input.addEventListener('scroll', () => {
      backdrop.scrollTop = input.scrollTop;
      backdrop.scrollLeft = input.scrollLeft;
    });

    // --------------- State ---------------
    let inflight = null;     // AbortController of current request, or null
    let pending = false;     // true if a re-check is scheduled after current finishes

    // Last completed classification result
    let lastResult = null;   // { text: string, words: [{word, errors}, ...] }

    // --------------- Debounce: fire-or-schedule on every input ---------------
    input.addEventListener('input', () => {
      updateHighlights();    // re-apply highlights to current text immediately
      if (inflight) {
        pending = true;      // already running — schedule one more
      } else {
        fireCheck();         // nothing running — fire now
      }
    });

    async function fireCheck() {
      const text = input.value.trim();
      if (!text) {
        lastResult = null;
        results.hidden = true;
        status.textContent = 'Ready';
        updateHighlights();
        return;
      }

      const controller = new AbortController();
      inflight = controller;
      pending = false;
      status.textContent = 'Checking\u2026';

      try {
        const resp = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
          signal: controller.signal,
        });
        const data = await resp.json();
        if (data.error) {
          status.textContent = 'Error: ' + data.error;
          return;
        }
        lastResult = { text, words: data.words };
        renderResults(data.words);
        updateHighlights();
        status.textContent = `Checked ${data.words.length} words`;
      } catch (e) {
        if (e.name !== 'AbortError') {
          status.textContent = 'Error: ' + e.message;
        }
      } finally {
        inflight = null;
        if (pending) {
          pending = false;
          fireCheck();       // re-check with whatever text is now in the box
        }
      }
    }

    // --------------- Highlight overlay ---------------
    function updateHighlights() {
      const currentText = input.value;
      if (!currentText) {
        backdrop.innerHTML = '';
        return;
      }

      if (!lastResult) {
        // No classification yet — show plain (escaped) text so whitespace matches
        backdrop.innerHTML = esc(currentText);
        return;
      }

      // Split both current text and classified text into words (by whitespace)
      const currentWords = currentText.split(/(\s+)/);   // keeps separators
      const classifiedWords = lastResult.text.split(/\s+/);

      // Build a map: classified word index → error type (first / highest)
      const errorMap = {};  // { wordIdx: topErrorType }
      lastResult.words.forEach((w, i) => {
        const types = Object.keys(w.errors);
        if (types.length > 0) {
          errorMap[i] = types[0]; // first listed type
        }
      });

      // Walk current tokens; non-space tokens get a word index
      let wordIdx = 0;
      let html = '';
      for (const token of currentWords) {
        if (/^\s+$/.test(token)) {
          // whitespace — preserve exactly
          html += esc(token);
        } else {
          // real word — check if it matches same-index classified word
          const errorType = errorMap[wordIdx];
          const classWord = classifiedWords[wordIdx];
          if (errorType && token === classWord) {
            html += `<mark class="hw hw-${errorType}">${esc(token)}</mark>`;
          } else {
            html += esc(token);
          }
          wordIdx++;
        }
      }
      backdrop.innerHTML = html;
    }

    // --------------- Results table ---------------
    function renderResults(words) {
      tbody.innerHTML = '';
      results.hidden = false;
      words.forEach((w, i) => {
        const tr = document.createElement('tr');
        const hasError = Object.keys(w.errors).length > 0;
        tr.className = hasError ? 'error' : 'clean';
        tr.innerHTML = `<td>${i + 1}</td><td>${esc(w.word)}</td>` +
          ERROR_TYPES.map(et => {
            const p = w.errors[et];
            return `<td>${p !== undefined ? p.toFixed(3) : ''}</td>`;
          }).join('');
        tbody.appendChild(tr);
      });
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
